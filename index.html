<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FF6B9D">
<title>공주 수련</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--c:#FF69B4;--c2:#FF85C8;--c3:#FFB6D9;--c4:#D8A7FF;--c5:#A0D4FF;--cl:#FFF0F8;--cd:#E0408A;--bg:#FFFAFD;--sf:#FFF2F8;--sf2:#FFECF4;--tx:#3D2040;--tm:#9A7090;--th:#C8A0B8;--bd:rgba(255,105,180,.12);--r:20px;--r2:24px;--glow:0 4px 20px rgba(255,105,180,.15)}
@media(prefers-color-scheme:dark){:root{--bg:#1C1020;--sf:#281828;--sf2:#321A30;--tx:#F8E8F4;--tm:#B888A8;--th:#7A5068;--bd:rgba(255,105,180,.18);--cl:#301828}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Gowun Batang','Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--tx);background-image:radial-gradient(circle at 20% 20%,rgba(255,182,217,.08) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(216,167,255,.08) 0%,transparent 50%)}
#app{max-width:480px;margin:0 auto;min-height:100dvh;padding:env(safe-area-inset-top) 16px 80px;overflow-y:auto;-webkit-overflow-scrolling:touch}

@keyframes floaty{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-6px) rotate(5deg)}}
@keyframes twinkle{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
@keyframes bounceIn{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.05)}70%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes jelly{0%,100%{transform:scale(1)}25%{transform:scale(.95,1.05)}50%{transform:scale(1.05,.95)}75%{transform:scale(.98,1.02)}}

.tabs{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(180deg,rgba(255,250,253,0),var(--bg) 20%);border-top:none;display:flex;justify-content:center;z-index:100;padding:8px 0 env(safe-area-inset-bottom);backdrop-filter:blur(10px)}
.tabs-inner{display:flex;max-width:480px;width:100%}
.tab{flex:1;padding:8px 0;text-align:center;font-size:10px;color:var(--th);border:none;background:none;cursor:pointer;font-family:inherit;transition:all .2s}
.tab-icon{font-size:22px;display:block;margin-bottom:2px}
.tab.active{color:var(--c);font-weight:700;transform:scale(1.08)}
.tab.active .tab-icon{animation:jelly .5s ease}

.header{padding:20px 0 8px;text-align:center;position:relative}
.header::before{content:'';position:absolute;top:10px;left:50%;transform:translateX(-50%);width:200px;height:200px;background:radial-gradient(circle,rgba(255,105,180,.06) 0%,transparent 70%);pointer-events:none}
.header h1{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(90deg,var(--c),var(--c4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.routine-label{font-size:26px;font-weight:900;margin:6px 0 2px;animation:bounceIn .5s ease}
.routine-sub{font-size:11px;color:var(--th)}

.cycle-bar{display:flex;gap:5px;margin:14px 0;padding:10px 12px;background:linear-gradient(135deg,var(--sf),var(--sf2));border-radius:var(--r);overflow-x:auto;box-shadow:var(--glow)}
.cycle-step{flex:1;text-align:center;padding:7px 4px;border-radius:14px;font-size:10px;color:var(--th);line-height:1.3;min-width:0;transition:all .3s}
.cycle-step.now{background:linear-gradient(135deg,var(--c),var(--c4));color:#fff;font-weight:700;transform:scale(1.1);box-shadow:0 3px 12px rgba(255,105,180,.35);animation:jelly .6s ease}
.cycle-step.done-step{color:var(--c);font-weight:500}
.cycle-step .step-icon{font-size:15px;display:block;margin-bottom:2px}

.weight-row{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--sf),#F8ECFF);border-radius:var(--r);padding:10px 14px;margin:8px 0;box-shadow:var(--glow)}
.weight-row .wv{font-size:20px;font-weight:900;flex:1;background:linear-gradient(135deg,var(--c),var(--c4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.weight-row .wv span{font-size:12px;-webkit-text-fill-color:var(--tm);font-weight:400}
.weight-row input{width:64px;border:2.5px solid var(--c3);border-radius:12px;padding:6px;font-size:14px;text-align:center;background:var(--bg);color:var(--tx);font-family:inherit;transition:border-color .2s}
.weight-row input:focus{border-color:var(--c);outline:none;box-shadow:0 0 0 3px rgba(255,105,180,.15)}
.weight-row button{background:linear-gradient(135deg,var(--c),var(--c4));color:#fff;border:none;border-radius:12px;padding:7px 16px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 3px 10px rgba(255,105,180,.25);transition:transform .15s}
.weight-row button:active{transform:scale(.92)}

/* ========== Royal Pink Safe Card v3 ========== */
.safe-card{margin:14px 0;border-radius:var(--r2);overflow:visible;position:relative;background:linear-gradient(150deg,#FFF2FA,#F8EAFF,#FFF0F8);border:2.5px solid var(--c3);box-shadow:var(--glow);transition:all .4s}
@media(prefers-color-scheme:dark){.safe-card{background:linear-gradient(150deg,#2A1A28,#241A30,#2A1A2F);border-color:#6B3050}}
.safe-card.stage-preapproved,.safe-card.stage-approved{border-color:#E8B84E;box-shadow:0 6px 30px rgba(232,184,78,.22),var(--glow)}
.safe-header{display:flex;flex-direction:column;align-items:center;padding:18px 16px 8px;gap:4px}
.safe-header-title{font-size:17px;font-weight:900;letter-spacing:1px;background:linear-gradient(90deg,var(--c),#C878D0,var(--c4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center}
.safe-header-edit{font-size:12px;color:var(--tm);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:500}
.safe-body{padding:0 16px 20px;display:flex;flex-direction:column;align-items:center;gap:14px}

/* ---- Vault Assembly (PNG frame, transparent heart) ---- */
.safe-assembly{position:relative;width:300px;height:450px;margin:0 auto;overflow:hidden}
/* Reward image BEHIND frame — positioned exactly at heart hole */
.safe-img-layer{position:absolute;top:148px;left:89px;width:123px;height:114px;z-index:0;pointer-events:none;overflow:hidden}
.safe-img-layer img{width:100%;height:100%;object-fit:cover;object-position:center;transition:filter .5s}
/* PNG safe frame — transparent background + heart hole */
.safe-frame-img{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none;object-fit:contain;transition:filter .4s}
/* Stage tints for frame — no grayscale, keep original colors */
.stage-approved .safe-frame-img{filter:brightness(1.1) drop-shadow(0 0 12px rgba(255,200,100,.4))}
/* Stage filters for reward image — no grayscale */
.stage-approved .safe-img-layer img{filter:brightness(1.1) saturate(1.15);animation:itemShine 3s ease-in-out infinite}
@keyframes itemShine{0%,100%{filter:brightness(1.1) saturate(1.15)}50%{filter:brightness(1.2) saturate(1.25)}}
/* Stamp */
.safe-stamp{position:absolute;top:70px;right:-8px;background:linear-gradient(135deg,#FF3E7A,#E8205A);color:#fff;font-family:'Gowun Batang',Georgia,serif;font-size:20px;font-weight:700;padding:11px 24px;border-radius:4px;transform:rotate(12deg) scale(0);transition:transform .4s;box-shadow:0 4px 14px rgba(255,62,122,.35);letter-spacing:3px;border:2.5px solid rgba(255,255,255,.5);z-index:6}
.stage-approved .safe-stamp{transform:rotate(12deg) scale(1);animation:stampPop .5s ease}
@keyframes stampPop{0%{transform:rotate(12deg) scale(0)}60%{transform:rotate(12deg) scale(1.2)}80%{transform:rotate(12deg) scale(.95)}100%{transform:rotate(12deg) scale(1)}}
/* Glow */
.safe-glow{display:none;position:absolute;inset:-16px;z-index:0;border-radius:36px;pointer-events:none;
  background:radial-gradient(ellipse,rgba(255,220,130,.22) 0%,rgba(255,105,180,.12) 45%,transparent 70%);
  animation:safeGlowPulse 2.5s ease-in-out infinite}
.stage-approved .safe-glow{display:block}
@keyframes safeGlowPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
/* Sparkles — approved only */
.safe-sparkles{position:absolute;inset:-6px;pointer-events:none;overflow:visible;z-index:5;display:none}
.stage-approved .safe-sparkles{display:block}
.safe-sparkle{position:absolute;opacity:0;animation:safeSparkle 3s ease-in-out infinite}
@keyframes safeSparkle{0%,100%{opacity:0;transform:scale(.4)}50%{opacity:.7;transform:scale(1)}}

/* ---- Status & Info ---- */
.safe-status{text-align:center;margin-top:4px}
.safe-status-badge{display:inline-block;padding:7px 22px;border-radius:20px;font-size:14px;font-weight:900;transition:all .4s}
.stage-stored .safe-status-badge{background:rgba(200,180,190,.18);color:var(--tm)}
.stage-review .safe-status-badge{background:rgba(255,105,180,.1);color:var(--c)}
.stage-examining .safe-status-badge{background:rgba(255,105,180,.15);color:var(--cd)}
.stage-preapproved .safe-status-badge{background:linear-gradient(135deg,rgba(232,184,78,.22),rgba(255,105,180,.12));color:#B07820;border:1.5px solid rgba(232,184,78,.4);font-size:15px}
.stage-approved .safe-status-badge{background:linear-gradient(135deg,var(--c),var(--c4));color:#fff;box-shadow:0 4px 14px rgba(255,105,180,.3);font-size:15px}
.safe-status-sub{font-size:12px;color:var(--tm);margin-top:4px;font-weight:500}

.safe-info{width:100%}
.safe-price{font-size:16px;color:#B07820;font-weight:900;text-align:center}
.safe-progress-label{font-size:13px;color:var(--tm);margin-top:10px;font-weight:700}
.safe-progress-wrap{display:flex;align-items:center;gap:8px;margin-top:5px}
.safe-progress-bar{flex:1;height:12px;background:var(--bd);border-radius:6px;overflow:hidden}
.safe-progress-fill{height:100%;border-radius:6px;transition:width .5s;background:linear-gradient(90deg,var(--c3),var(--c),var(--c4))}
.stage-preapproved .safe-progress-fill,.stage-approved .safe-progress-fill{background:linear-gradient(90deg,var(--c),#E8B84E,#FFD700)}
.safe-progress-pct{font-size:16px;font-weight:900;background:linear-gradient(135deg,var(--c),var(--c4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;min-width:40px;text-align:right}

.safe-comment{font-size:13px;color:var(--tx);margin-top:10px;padding:10px 14px;background:rgba(255,105,180,.05);border-radius:12px;line-height:1.6;border-left:3.5px solid var(--c);font-style:italic;text-align:left;font-weight:500}
.safe-days-left{font-size:13px;color:var(--tm);margin-top:8px;text-align:center;font-weight:700}
.safe-swaps{font-size:12px;color:var(--tm);margin-top:4px;text-align:center;font-weight:500}

.safe-cta{margin-top:10px;padding:14px;background:linear-gradient(135deg,#E8B84E,#FFD700);color:#5A3A00;border:none;border-radius:16px;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit;width:100%;box-shadow:0 4px 15px rgba(232,184,78,.35);transition:transform .15s;letter-spacing:.5px}
.safe-cta:active{transform:scale(.94)}

/* Upload empty state */
.safe-upload{padding:32px 20px;text-align:center;cursor:pointer}
.safe-upload-icon{font-size:52px;margin-bottom:10px;animation:floaty 3s ease-in-out infinite}
.safe-upload-title{font-size:17px;font-weight:900;background:linear-gradient(90deg,var(--c),var(--c4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.safe-upload-text{font-size:14px;color:var(--tm);line-height:1.8;font-weight:500}
.safe-upload-text b{color:var(--c);display:block;margin-top:8px;font-size:16px;font-weight:700}

.ex-list{display:flex;flex-direction:column;gap:10px;margin:10px 0}
.ex-card{background:linear-gradient(135deg,var(--sf),#FDF0FF);border-radius:var(--r);padding:16px;transition:all .3s;border:2.5px solid transparent;box-shadow:0 2px 12px rgba(255,105,180,.06)}
.ex-card.done{opacity:.4;border-color:var(--c3);background:var(--sf2)}
.ex-card.done .ex-name{text-decoration:line-through;color:var(--c)}
.ex-name{font-size:15px;font-weight:900;margin-bottom:3px;color:var(--tx)}
.ex-desc{font-size:11px;color:var(--th);margin-bottom:10px}
.ex-sets{display:flex;gap:8px;flex-wrap:wrap}
.set-btn{width:40px;height:40px;border-radius:50%;border:3px solid var(--c3);background:var(--bg);font-size:12px;font-weight:900;color:var(--c);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit;box-shadow:0 2px 8px rgba(255,105,180,.08)}
.set-btn.done{background:linear-gradient(135deg,var(--c),var(--c4));border-color:transparent;color:#fff;transform:scale(1.1);box-shadow:0 3px 12px rgba(255,105,180,.3);animation:bounceIn .3s ease}
.set-btn:active{transform:scale(.8)}
.how-btn{font-size:11px;color:var(--c);background:none;border:none;cursor:pointer;font-family:inherit;margin-top:10px;padding:0;font-weight:700}
.how-text{font-size:11px;color:var(--tm);line-height:1.6;margin-top:6px;white-space:pre-line;display:none;background:rgba(255,105,180,.04);padding:10px;border-radius:12px}

.rest-timer{margin-top:10px;padding:10px 12px;background:linear-gradient(135deg,var(--cl),#F0E8FF);border-radius:14px;display:flex;align-items:center;gap:8px;animation:bounceIn .3s ease}
.rest-timer-bar{flex:1;height:8px;background:var(--bd);border-radius:4px;overflow:hidden}
.rest-timer-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--c3),var(--c),var(--c4));width:0%;transition:width .3s linear}
.rest-timer-text{font-size:12px;font-weight:900;color:var(--c);min-width:36px;text-align:right}
.rest-timer.done-timer{background:linear-gradient(135deg,#E8FFE8,#E8F4FF)}
.rest-timer.done-timer .rest-timer-fill{background:linear-gradient(90deg,#66CC99,#44AA88)}
.rest-timer.done-timer .rest-timer-text{color:#22AA66;animation:jelly .5s ease}

.progress-bar{height:10px;background:var(--sf2);border-radius:5px;margin:14px 0 8px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.05)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--c3),var(--c),var(--c4));border-radius:5px;transition:width .3s}
.progress-text{font-size:11px;color:var(--th);text-align:center;margin-bottom:12px;font-weight:500}

.walk-card{text-align:center;padding:40px 16px;margin:16px 0;background:linear-gradient(135deg,var(--cl),#F0E8FF);border-radius:var(--r2);border:2.5px dashed var(--c3);box-shadow:var(--glow)}
.walk-card h2{font-size:22px;margin-bottom:8px;font-weight:900}
.walk-card p{font-size:13px;color:var(--tm);line-height:1.5;margin-bottom:16px}

.done-card{text-align:center;padding:36px 16px;margin:16px 0;animation:bounceIn .5s ease}
.done-card h2{font-size:28px;margin-bottom:8px;animation:jelly .8s ease}
.done-card p{font-size:13px;color:var(--tm);margin-bottom:20px;line-height:1.5}
.done-btns{display:flex;flex-direction:column;gap:10px}
.btn-primary{padding:16px;background:linear-gradient(135deg,var(--c),var(--c4));color:#fff;border:none;border-radius:var(--r);font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;width:100%;box-shadow:0 6px 20px rgba(255,105,180,.3);transition:all .15s;letter-spacing:.5px}
.btn-primary:active{transform:scale(.96);box-shadow:0 3px 10px rgba(255,105,180,.2)}
.btn-ghost{padding:14px;background:rgba(255,105,180,.05);border:2.5px solid var(--c3);border-radius:var(--r);font-size:14px;color:var(--c);cursor:pointer;font-family:inherit;width:100%;font-weight:600;transition:all .15s}
.btn-ghost:active{transform:scale(.96);background:rgba(255,105,180,.1)}
.btn-skip{padding:12px;background:var(--sf);border:2.5px dashed var(--c3);border-radius:var(--r);font-size:13px;color:var(--th);cursor:pointer;font-family:inherit;width:100%;margin-top:4px;transition:all .15s}
.btn-skip:active{transform:scale(.96)}

.cal-month{text-align:center;font-size:18px;font-weight:900;margin:20px 0 14px;display:flex;align-items:center;justify-content:center;gap:14px}
.cal-nav{background:linear-gradient(135deg,var(--sf),var(--sf2));border:2px solid var(--c3);font-size:16px;cursor:pointer;color:var(--c);padding:6px 12px;border-radius:12px;transition:all .15s}
.cal-nav:active{transform:scale(.9)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:16px}
.cal-day-header{text-align:center;font-size:10px;color:var(--th);padding:4px 0;font-weight:700}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:14px;font-size:12px;color:var(--tm);cursor:pointer;transition:all .2s;position:relative;font-weight:500}
.cal-day:active{transform:scale(.85)}
.cal-day.today{font-weight:900;color:var(--tx);background:rgba(255,105,180,.06)}
.cal-day.has-record{background:linear-gradient(135deg,var(--cl),#F0E8FF);color:var(--c);font-weight:700;box-shadow:0 2px 8px rgba(255,105,180,.1)}
.cal-day.has-record::after{content:'';width:6px;height:6px;border-radius:50%;background:linear-gradient(135deg,var(--c),var(--c4));position:absolute;bottom:4px;animation:twinkle 2s infinite}
.cal-day.selected{background:linear-gradient(135deg,var(--c),var(--c4));color:#fff;font-weight:900;box-shadow:0 3px 12px rgba(255,105,180,.3)}
.cal-day.selected::after{background:#fff;animation:none}
.cal-detail{background:linear-gradient(135deg,var(--sf),#FDF0FF);border-radius:var(--r);padding:16px;margin:8px 0;box-shadow:var(--glow);animation:bounceIn .3s ease}
.cal-detail-title{font-size:14px;font-weight:900;margin-bottom:8px;color:var(--c)}
.cal-detail-item{font-size:12px;color:var(--tm);padding:5px 0}

.wt-current{text-align:center;padding:24px 0}
.wt-current .wt-num{font-size:48px;font-weight:900;background:linear-gradient(135deg,var(--c),var(--c4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.wt-current .wt-unit{font-size:14px;color:var(--tm);font-weight:500}
.wt-input-row{display:flex;gap:8px;margin:0 0 16px;align-items:center}
.wt-input-row input{flex:1;border:2.5px solid var(--c3);border-radius:var(--r);padding:14px;font-size:16px;text-align:center;background:var(--bg);color:var(--tx);font-family:inherit;transition:all .2s}
.wt-input-row input:focus{border-color:var(--c);outline:none;box-shadow:0 0 0 4px rgba(255,105,180,.12)}
.wt-input-row button{background:linear-gradient(135deg,var(--c),var(--c4));color:#fff;border:none;border-radius:var(--r);padding:14px 22px;font-size:15px;font-weight:900;font-family:inherit;cursor:pointer;box-shadow:0 4px 15px rgba(255,105,180,.25);transition:transform .15s}
.wt-input-row button:active{transform:scale(.92)}
.wt-chart{background:linear-gradient(135deg,var(--sf),#FDF0FF);border-radius:var(--r);padding:16px;margin:14px 0;box-shadow:var(--glow)}
.wt-chart canvas{width:100%;height:200px}
.wt-list{margin:14px 0}
.wt-item{display:flex;justify-content:space-between;padding:12px 0;border-bottom:2px solid rgba(255,105,180,.06);font-size:13px;font-weight:500}
.wt-item .wt-d{color:var(--th)}

.crop-modal{position:fixed;inset:0;background:rgba(30,10,30,.9);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.crop-title{color:#fff;font-size:15px;margin-bottom:14px;font-weight:900}
.crop-area{width:240px;height:240px;overflow:hidden;border-radius:20px;border:3px solid var(--c);position:relative;touch-action:none;cursor:grab;box-shadow:0 0 30px rgba(255,105,180,.3)}
.crop-area img{position:absolute;max-width:none;max-height:none;user-select:none;-webkit-user-drag:none}
.crop-btns{display:flex;gap:14px;margin-top:18px}
.crop-btns button{padding:12px 28px;border-radius:16px;font-size:14px;font-weight:900;border:none;cursor:pointer;font-family:inherit;transition:transform .15s}
.crop-btns button:active{transform:scale(.92)}
.crop-save{background:linear-gradient(135deg,var(--c),var(--c4));color:#fff;box-shadow:0 4px 15px rgba(255,105,180,.3)}
.crop-cancel{background:rgba(255,255,255,.1);color:#fff;border:2px solid rgba(255,255,255,.2)!important}

.skip-modal{position:fixed;inset:0;background:rgba(30,10,30,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(5px)}
.skip-box{background:var(--bg);border-radius:var(--r2);padding:28px;max-width:320px;width:100%;text-align:center;box-shadow:0 10px 40px rgba(255,105,180,.15);animation:bounceIn .3s ease}
.skip-box h3{font-size:20px;margin-bottom:10px;font-weight:900}

function seededRand(seed){return function(){seed=(seed*16807+0)%2147483647;return(seed-1)/2147483646}}
function pickRandom(arr,n,rng){
  var a=arr.slice();var res=[];
  for(var i=0;i<n&&a.length;i++){var idx=Math.floor(rng()*a.length);res.push(a.splice(idx,1)[0])}
  return res;
}
function generateRoutine(idx){
  var seed=idx*7919+31;
  var rng=seededRand(seed);
  var labels=['A','B','C'];
  var icons=['👸','💎','🌸'];
  var li=idx%3;
  var base=[
    pickRandom(POOL.compound,1,rng)[0],
    pickRandom(POOL.hinge,1,rng)[0],
    pickRandom(rng()<0.5?POOL.pull:POOL.push,1,rng)[0],
    pickRandom(POOL.core,1,rng)[0]
  ];
  var exercises=base.map(function(ex,i){
    var key=idx+'_'+i;
    if(S.swapped&&S.swapped[key]){return S.swapped[key]}
    return ex;
  });
  return {
    type:'strength',
    name:'왕실 근력 수련 '+labels[li],
    icon:icons[li],
    short:'수련'+labels[li],
    exercises:exercises
  };
}

  var d=new Date();
  // check if today has record, if not start from yesterday
  var tk=d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();
  if(!days[tk]){
    d.setDate(d.getDate()-1);
  }
  var streak=0;
  for(var i=0;i<365;i++){
    var k=d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();
    if(days[k]){streak++;d.setDate(d.getDate()-1);}
    else break;
  }
  return streak;
}
function getDaysLeftInMonth(){
  var now=new Date();
  var last=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  return last-now.getDate();
}

function saveWt(){

  if(!v||v<20||v>300)return;

  save();renderWeight();toast(v+'kg 저장!');

function drawChart(){
  var canvas=document.getElementById('wtCanvas');
  if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var dpr=window.devicePixelRatio||1;
  canvas.width=canvas.offsetWidth*dpr;
  canvas.height=200*dpr;
  ctx.scale(dpr,dpr);
  var W=canvas.offsetWidth,H=200;
  var data=S.weights.slice(-20);
  var vals=data.map(function(w){return w.kg});
  var min=Math.min.apply(null,vals)-1;
  var max=Math.max.apply(null,vals)+1;
  var range=max-min||1;
  var padL=40,padR=10,padT=15,padB=25;
  var gw=W-padL-padR,gh=H-padT-padB;
  ctx.strokeStyle='rgba(255,107,157,0.1)';ctx.lineWidth=1;
  for(var i=0;i<5;i++){
    var y=padT+gh*i/4;
    ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke();
    ctx.fillStyle='#bbb';ctx.font='10px sans-serif';ctx.textAlign='right';
    ctx.fillText((max-range*i/4).toFixed(1),padL-4,y+3);
  }
  ctx.beginPath();
  ctx.strokeStyle='#FF6B9D';ctx.lineWidth=2.5;ctx.lineJoin='round';
  data.forEach(function(w,i){
    var x=padL+i/(data.length-1)*gw;
    var y=padT+(max-w.kg)/range*gh;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.stroke();
  data.forEach(function(w,i){
    var x=padL+i/(data.length-1)*gw;
    var y=padT+(max-w.kg)/range*gh;
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle='#FF6B9D';ctx.fill();
    ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  });
  ctx.fillStyle='#bbb';ctx.font='9px sans-serif';ctx.textAlign='center';
  [0,Math.floor(data.length/2),data.length-1].forEach(function(i){
    if(!data[i])return;
    var x=padL+i/(data.length-1)*gw;
    ctx.fillText(data[i].date.split('.').slice(1).join('/'),x,H-5);
  });
}

// --- Rest timer ---
var restTimer=null;
var restEi=-1,restSi=-1;
var restStart=0;
var REST_SEC=60;
function startRest(ei,si){
  clearInterval(restTimer);
  restEi=ei;restSi=si;
  restStart=Date.now();
  restTimer=setInterval(function(){
    var elapsed=Math.floor((Date.now()-restStart)/1000);
    if(elapsed>=REST_SEC){
      clearInterval(restTimer);
      updateRestUI(REST_SEC);
      restTimer=null;
    } else {
      updateRestUI(elapsed);
    }
  },200);
}
function restoreRestUI(){
  if(!restTimer||restEi<0)return;
  var elapsed=Math.floor((Date.now()-restStart)/1000);
  if(elapsed<REST_SEC)updateRestUI(elapsed);
  else updateRestUI(REST_SEC);
}
function updateRestUI(sec){
  var el=document.getElementById('rest-'+restEi+'-'+restSi);
  if(!el)return;
  var pct=Math.min(100,Math.round(sec/REST_SEC*100));
  var left=REST_SEC-sec;
  var bar=el.querySelector('.rest-timer-fill');
  var txt=el.querySelector('.rest-timer-text');
  if(bar)bar.style.width=pct+'%';
  if(txt)txt.textContent=left>0?left+'초':'GO!';
  if(left<=0)el.classList.add('done-timer');
}

// --- Actions ---
function togSet(ei,si){
  var key=ei+'_'+si;
  var wasDone=S.sets[key];
  S.sets[key]=!S.sets[key];
  save();
  if(!wasDone&&S.sets[key]){
    var r=curRoutine();
    var ex=r.exercises[ei];
    var allExDone=true;
    for(var s=0;s<ex.sets;s++){if(!S.sets[ei+'_'+s]){allExDone=false;break;}}
    if(!allExDone){startRest(ei,si);}
    else{clearInterval(restTimer);restTimer=null;restEi=-1;}
  } else {
    clearInterval(restTimer);restTimer=null;restEi=-1;
  }
  // Check if ALL exercises complete -> show popup
  var r=curRoutine();
  if(r.type==='strength'){
    var totalSets=0,doneSets=0;
    r.exercises.forEach(function(ex,i){
      for(var s=0;s<ex.sets;s++){totalSets++;if(S.sets[i+'_'+s])doneSets++;}
    });
    if(doneSets===totalSets&&!wasDone){
      showCompletePopup(r);
    }
  }
  render();
}
function togHow(btn){
  var txt=btn.nextElementSibling;
  if(txt.style.display==='block'){txt.style.display='none';btn.textContent='방법 보기 →';}
  else{txt.style.display='block';btn.textContent='접기';}
}
function addHistory(r){
  var now=new Date();
  S.history.push({name:r.name,icon:r.icon,year:now.getFullYear(),month:now.getMonth(),day:now.getDate(),date:(now.getMonth()+1)+'/'+now.getDate()});
}
function pickCardio(ci){
  S.cardioChoice=ci;
  save();render();
}
function completeCardio(ci){
  var c=CARDIO_OPTIONS[ci];
  var now=new Date();
  S.history.push({name:c.name,icon:c.icon,year:now.getFullYear(),month:now.getMonth(),day:now.getDate(),date:(now.getMonth()+1)+'/'+now.getDate()});
  S.idx++;S.cardioChoice=null;save();
  var count=getMonthCount();
  var pctGain=Math.round(100/GOAL);
  showCompletePopupCustom(c.icon+' '+c.name, pctGain, count);
  render();checkRewardUnlock();
}
function nextRoutine(doNow){
  addHistory(curRoutine());S.idx++;S.sets={};save();
  if(doNow)toast(curRoutine().icon+' '+curRoutine().name+' 시작!');
  else toast('다음에 할게요! 👋');
  render();checkRewardUnlock();
}
function goBack(){
  if(S.idx>0){
    S.idx--;S.sets={};S.cardioChoice=null;
    if(S.history.length>0){
      var last=S.history[S.history.length-1];
      var now=new Date();
      if(last.year===now.getFullYear()&&last.month===now.getMonth()&&last.day===now.getDate()){
        S.history.pop();
      }
    }
    save();render();toast('되돌렸어요! ↩');
  }
}

// --- Complete Popup ---
function showCompletePopup(routine){
  // record history first
  addHistory(routine);
  var count=getMonthCount();
  var pctGain=Math.round(100/GOAL);
  showCompletePopupCustom(routine.icon+' '+routine.name, pctGain, count);

}

  h+='<div class="complete-item">✨ 소비 정당화 게이지 <b>+'+pctGain+'%</b></div>';

  h+='<div class="complete-item">📊 이번 달 <b>'+count+'/'+GOAL+'회</b> 완료</div>';

function closeCompletePopup(){closeModal()}

function exportBackup(){
  var data=JSON.stringify(S,null,2);
  var blob=new Blob([data],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='princess-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(url);
  toast('백업 완료! 📦');
}
function importBackup(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data.history&&!data.weights){toast('올바른 백업 파일이 아니에요!');return;}
      if(confirm('기존 데이터를 덮어쓸까요?')){
        S=data;save();render();toast('복원 완료! 📥');
      }
    }catch(err){toast('파일을 읽을 수 없어요!');}
  };
  reader.readAsText(file);
}
function saveW(){
  var v=parseFloat(document.getElementById('wi').value);
  if(!v||v<20||v>300)return;
  var now=new Date();
  S.weights.push({kg:v,date:(now.getFullYear())+'.'+(now.getMonth()+1)+'.'+now.getDate()});
  save();render();toast(v+'kg 저장! 👸');

// --- Swap exercise ---
function showSwapConfirm(exIdx){
  var swaps=getSwapsUsed();
  var left=SWAP_MAX-swaps;
  var r=curRoutine();
  var ex=r.exercises[exIdx];
  var h='<div class="skip-modal" onclick="if(event.target===this)closeModal()">';
  h+='<div class="skip-box">';
  if(left<=0){
    h+='<h3>😥 변경 소진!</h3>';
    h+='<p>이번 달 변경 '+SWAP_MAX+'번을 다 썼어요.<br>지금 운동으로 힘내봐요!</p>';
    h+='<div class="skip-btns"><button style="flex:1;background:var(--c);color:#fff" onclick="closeModal()">알겠어요 💪</button></div>';
  } else {
    h+='<h3>'+ex.name+' 변경할까요? 🔄</h3>';
    h+='<span class="skip-count">남은 변경: '+left+'번</span>';
    h+='<p>같은 부위의 다른 운동으로 바꿔요!</p>';
    h+='<div class="skip-btns">';
    h+='<button style="background:var(--sf);color:var(--tm)" onclick="closeModal()">그냥 할게</button>';
    h+='<button style="background:var(--c);color:#fff" onclick="doSwap('+exIdx+')">변경!</button>';
    h+='</div>';
  }
  h+='</div></div>';
  document.getElementById('modal').innerHTML=h;
}
function doSwap(exIdx){
  var cats=['compound','hinge',null,'core'];
  var catName=cats[exIdx];
  if(catName===null) catName=POOL.pull.some(function(e){return e.name===curRoutine().exercises[exIdx].name})?'pull':'push';
  var pool=POOL[catName];
  var cur=curRoutine().exercises[exIdx].name;
  var others=pool.filter(function(e){return e.name!==cur});
  if(others.length===0){closeModal();toast('다른 운동이 없어요!');return;}
  var pick=others[Math.floor(Math.random()*others.length)];
  var key=S.idx+'_'+exIdx;
  S.swapped[key]=pick;
  for(var s=0;s<10;s++){delete S.sets[exIdx+'_'+s]}
  var mk=curMonthKey();
  S.swaps[mk]=(S.swaps[mk]||0)+1;
  save();closeModal();
  toast('🔄 '+pick.name+'(으)로 변경!');render();
}
function closeModal(){document.getElementById('modal').innerHTML=''}

function checkRewardUnlock(){

function startCrop(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){showCropModal(e.target.result)};
  reader.readAsDataURL(file);
}
function showCropModal(src){
  var h='<div class="crop-modal">';
  h+='<div class="crop-title">드래그로 위치 조정 ✂️</div>';
  h+='<div class="crop-area" id="cropArea"><img id="cropImg" src="'+src+'"></div>';
  h+='<div class="crop-btns">';
  h+='<button class="crop-cancel" onclick="closeModal()">취소</button>';
  h+='<button class="crop-save" onclick="saveCrop()">완료 ✨</button>';
  h+='</div></div>';
  document.getElementById('modal').innerHTML=h;
  var img=document.getElementById('cropImg');
  img.onload=function(){
    var area=document.getElementById('cropArea');
    var aw=area.offsetWidth,ah=area.offsetHeight;
    var iw=img.naturalWidth,ih=img.naturalHeight;
    var scale;
    if(iw/ih>1){scale=ah/ih;} else {scale=aw/iw;}
    img.style.width=(iw*scale)+'px';
    img.style.height=(ih*scale)+'px';
    img.style.left=((aw-iw*scale)/2)+'px';
    img.style.top=((ah-ih*scale)/2)+'px';
    var sx,sy,sl,st;
    function onStart(e){
      e.preventDefault();
      var p=e.touches?e.touches[0]:e;
      sx=p.clientX;sy=p.clientY;
      sl=parseFloat(img.style.left)||0;
      st=parseFloat(img.style.top)||0;
    }
    function onMove(e){
      if(sx===undefined)return;
      e.preventDefault();
      var p=e.touches?e.touches[0]:e;
      var dx=p.clientX-sx,dy=p.clientY-sy;
      img.style.left=(sl+dx)+'px';
      img.style.top=(st+dy)+'px';
    }
    function onEnd(){sx=undefined}
    area.addEventListener('touchstart',onStart,{passive:false});
    area.addEventListener('touchmove',onMove,{passive:false});
    area.addEventListener('touchend',onEnd);
    area.addEventListener('mousedown',onStart);
    area.addEventListener('mousemove',onMove);
    area.addEventListener('mouseup',onEnd);
  };
}
function saveCrop(){
  var area=document.getElementById('cropArea');
  var img=document.getElementById('cropImg');
  var canvas=document.createElement('canvas');
  canvas.width=240;canvas.height=240;
  var ctx=canvas.getContext('2d');
  var l=parseFloat(img.style.left)||0;
  var t=parseFloat(img.style.top)||0;
  var dw=parseFloat(img.style.width);
  var dh=parseFloat(img.style.height);
  var sx=-l/dw*img.naturalWidth;
  var sy=-t/dh*img.naturalHeight;
  var sw=240/dw*img.naturalWidth;
  var sh=240/dh*img.naturalHeight;
  ctx.drawImage(img,sx,sy,sw,sh,0,0,240,240);
  S.reward.img=canvas.toDataURL('image/jpeg',0.85);
  S.reward.month=curMonthKey();
  save();closeModal();render();toast('왕실 심사 접수 완료! 👑');
}

function showConfetti(){
  var c=document.createElement('div');c.className='confetti';
  var colors=['#FF6B9D','#FFB3C6','#fbbf24','#a78bfa','#34d399','#60a5fa','#FF8FB1'];
  for(var i=0;i<50;i++){
    var p=document.createElement('div');p.className='confetti-piece';
    p.style.left=Math.random()*100+'%';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay=Math.random()*1.2+'s';
    p.style.width=(6+Math.random()*8)+'px';
    p.style.height=(6+Math.random()*8)+'px';
    c.appendChild(p);
  }
  document.body.appendChild(c);
  setTimeout(function(){c.remove()},3500);
}
